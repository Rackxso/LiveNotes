<dialog #dialogEl (click)="onBackdropClick($event)">
  <div class="modal-panel">

    <header class="modal-header">
      <h2 class="modal-title">Nuevo presupuesto</h2>
      <button type="button" class="modal-close" (click)="close()" aria-label="Cerrar">×</button>
    </header>

    <form class="create-form" [formGroup]="form" (ngSubmit)="submit()">

      <div class="field">
        <label for="b-nombre">Categoría</label>
        <input id="b-nombre" type="text" formControlName="nombre" placeholder="Ej: Alimentación, Ocio..." />
      </div>

      <div class="field">
        <label>Color</label>
        <div class="color-swatches">
          @for (c of colors; track c) {
            <button type="button" class="swatch"
              [style.background]="c"
              [class.selected]="selectedColor() === c"
              (click)="selectedColor.set(c)"
              [attr.aria-label]="c">
            </button>
          }
        </div>
      </div>

      <div class="field">
        <label for="b-limite">Límite (€)</label>
        <input id="b-limite" type="number" formControlName="limite" min="0.01" step="0.01" />
      </div>

      <div class="field-row">
        <div class="field">
          <label for="b-mes">Mes</label>
          <select id="b-mes" formControlName="mes">
            @for (m of months; track m.value) {
              <option [value]="m.value">{{ m.label }}</option>
            }
          </select>
        </div>

        <div class="field">
          <label for="b-anio">Año</label>
          <input id="b-anio" type="number" formControlName="anio" min="2020" />
        </div>
      </div>

      <div class="form-actions">
        <app-secondary-button class="small" [config]="{texto: 'Cancelar'}" (clicked)="close()" />
        <app-primary-button class="small" [config]="{texto: 'Guardar', type: 'submit'}" [disabled]="form.invalid" />
      </div>

    </form>
  </div>
</dialog>
