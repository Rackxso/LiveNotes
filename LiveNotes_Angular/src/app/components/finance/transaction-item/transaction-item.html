<div class="tx-row">
  <span class="tx-name">{{ transaction().name }}</span>
  <span class="tx-cat" [class]="categoryClass()">{{ transaction().category }}</span>
  <span class="tx-date">{{ formattedDate() }}</span>
  <span class="tx-amt" [class]="amountClass()">{{ formattedAmount() }}</span>
</div>
