<aside class="sidebar" [class.expanded]="expanded()">

    <button class="toggle-btn" (click)="toggle()">
        <i class="fa-solid fa-angles-right"></i>
    </button>

    <div class="logo-area">
        <div class="logo-mark"><i class="fa-brands fa-bity"></i></div>
        <div class="logo-text">Live Notes</div>
    </div>

    <nav class="nav-section">

        @for (item of mainNav; track item.route) {
            <a class="nav-item"
               [routerLink]="item.route"
               routerLinkActive="active"
               [routerLinkActiveOptions]="{ exact: item.exact ?? false }">
                <i [class]="item.icon"></i>
                <span class="nav-label">{{ item.label }}</span>
            </a>
        }

        <div class="divider"></div>

        @for (item of secondaryNav; track item.route) {
            <a class="nav-item"
               [routerLink]="item.route"
               routerLinkActive="active"
               [routerLinkActiveOptions]="{ exact: item.exact ?? false }">
                <i [class]="item.icon"></i>
                <span class="nav-label">{{ item.label }}</span>
            </a>
        }

    </nav>

    <div class="user-area">
        <div class="user-card">
            <div class="avatar">A</div>
            <div class="user-info">
                <div class="user-name">Ana García</div>
                <div class="user-role">Personal</div>
            </div>
        </div>
    </div>

</aside>
