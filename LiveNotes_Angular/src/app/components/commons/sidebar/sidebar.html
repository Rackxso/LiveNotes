<aside class="sidebar" [class.expanded]="expanded()">

  <button class="toggle-btn" (click)="toggle()"
    [attr.aria-label]="expanded() ? 'Collapse sidebar' : 'Expand sidebar'">
    <i class="fa-solid fa-angles-right" aria-hidden="true"></i>
  </button>

  <div class="logo-area">
    <i class="fa-brands fa-bity logo-mark" aria-hidden="true"></i>
    <span class="logo-text">Live Notes</span>
  </div>

  <div class="divider"></div>

  <!-- Main nav — crece y centra verticalmente su contenido -->
  <nav class="nav-main" aria-label="Main">
    @for (item of mainNav(); track item.route) {
      <a class="nav-item"
         [routerLink]="item.route"
         routerLinkActive="active"
         [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
         [attr.aria-label]="item.label"
         [title]="!expanded() ? item.label : null">
        <i [class]="item.icon" aria-hidden="true"></i>
        <span class="nav-label">{{ item.label }}</span>
        @if (item.badge) {
          <span class="badge">{{ item.badge }}</span>
        }
      </a>
    }
  </nav>

  <!-- Bottom group: secondary nav + lang -->
  <div class="nav-bottom">
    <div class="divider"></div>

    <nav aria-label="Secondary">
      @for (item of secondaryNav(); track item.route) {
        <a class="nav-item"
           [routerLink]="item.route"
           routerLinkActive="active"
           [routerLinkActiveOptions]="{ exact: item.exact ?? false }"
           [attr.aria-label]="item.label"
           [title]="!expanded() ? item.label : null">
          <i [class]="item.icon" aria-hidden="true"></i>
          <span class="nav-label">{{ item.label }}</span>
        </a>
      }
    </nav>

    <app-lang-selector [expanded]="expanded()" />
  </div>

  <div class="user-area">
    @if (userMenuOpen()) {
      <div class="user-menu" role="menu">
        <button class="user-menu-item" role="menuitem" (click)="logout()">
          <i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i>
          <span>Cerrar sesión</span>
        </button>
      </div>
    }
    <button
      class="user-card"
      [title]="!expanded() ? userName() : null"
      [attr.aria-label]="'Menú de ' + userName()"
      [attr.aria-expanded]="userMenuOpen()"
      (click)="toggleUserMenu()"
    >
      <div class="avatar" aria-hidden="true">{{ userInitial() }}</div>
      <div class="user-info">
        <div class="user-name">{{ userName() }}</div>
        <div class="user-role">Personal</div>
      </div>
    </button>
  </div>

</aside>
