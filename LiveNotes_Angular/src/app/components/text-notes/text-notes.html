<ul class="notes-grid" role="list">
  @for (note of filteredNotes(); track note._id) {
    <li class="note-card">
      <span class="note-title">{{ note.titulo }}</span>
      @if (note.contenido) {
        <span class="note-content">{{ note.contenido }}</span>
      }
    </li>
  }
  <li class="addBlank"
      role="button"
      tabindex="0"
      (click)="addNote.emit()"
      (keydown.enter)="addNote.emit()"
      (keydown.space)="addNote.emit()"
      aria-label="Add new note">
    <p>Add new note</p>
  </li>
</ul>
