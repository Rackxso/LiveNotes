<app-header
  [vistasPage]="vistasPage()"
  [vistaActiva]="vistaActivaTraducida()"
  [name]="nombreVista()"
  [buttons]="false"
  (vistaSeleccionada)="onVistaSeleccionada($event)">
</app-header>

<div class="finance-body">
  @switch (vistaActual()) {
    @case ('Transactions') {
      <app-finance-transactions />
    }
    @case ('Savings') {
      <app-finance-savings />
    }
    @default {
      <app-finance-overview />
    }
  }
</div>
