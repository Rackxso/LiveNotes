<app-header
  [vistasPage]="vistasPage()"
  [vistaActiva]="vistaActivaTraducida()"
  [name]="nombreVista()"
  [primaryButton]="primaryButton()"
  [secondaryButton]="secondaryButton()"
  (vistaSeleccionada)="onVistaSeleccionada($event)"
  (primaryClicked)="onPrimaryClicked()"
  [buttons]="true">
</app-header>

<div class="cuerpo">
  @switch (vistaActual()) {
    @case ('Week') {
      <app-week-view
        [eventos]="eventos()"
        [diaSeleccionado]="diaSeleccionado()"
        (diaSeleccionadoChange)="onDiaSeleccionado($event)">
      </app-week-view>
    }
    @case ('Day') {
      <app-day-view
        [eventos]="eventos()"
        [diaSeleccionado]="diaSeleccionado()"
        (diaSeleccionadoChange)="onDiaSeleccionado($event)">
      </app-day-view>
    }
    @default {
      <app-month-view
        [eventos]="eventos()"
        [diaSeleccionado]="diaSeleccionado()"
        (diaSeleccionadoChange)="onDiaSeleccionado($event)"
        (mesVisibleChange)="onMesVisibleChange($event)">
      </app-month-view>
    }
  }

  <app-eventos
    [diaSeleccionado]="diaSeleccionado()"
    [vista]="vistaActual()"
    [eventosDia]="eventosDia()"
    [eventosSemana]="eventosSemana()"
    [eventosMes]="eventosMes()"
    (addEventoDia)="abrirModalDia()"/>
</div>

@if(modalAbierto()){
  <app-add-event-modal
    [fechaInicial]="fechaModal()"
    (cerrar)="cerrarModal()"
    (guardar)="onGuardarEvento($event)"/>
}
