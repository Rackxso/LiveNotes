<div class="overlay" (click)="onCerrar()" role="dialog" aria-modal="true" [attr.aria-labelledby]="'add-habit-title'">
  <div class="modal" (click)="$event.stopPropagation()">

    <div class="modal-header">
      <h2 id="add-habit-title">{{ t()('tracker.modal.title') }}</h2>
      <button class="close-btn" type="button" [attr.aria-label]="t()('tracker.modal.cancel')" (click)="onCerrar()">✕</button>
    </div>

    <form [formGroup]="form" (ngSubmit)="onGuardar()">
      <div class="field">
        <label for="habit-name">{{ t()('tracker.modal.name') }} <span aria-hidden="true">*</span></label>
        <input
          id="habit-name"
          type="text"
          formControlName="name"
          [placeholder]="t()('tracker.modal.namePlaceholder')"
          autocomplete="off"
          [attr.aria-invalid]="form.controls.name.invalid && form.controls.name.touched" />
        @if (form.controls.name.invalid && form.controls.name.touched) {
          <span class="field-error" role="alert">
            @if (form.controls.name.hasError('required')) { Required. }
            @else if (form.controls.name.hasError('maxlength')) { Max 100 characters. }
          </span>
        }
      </div>

      <div class="modal-footer">
        <app-secondary-button class="small" [config]="{texto: t()('tracker.modal.cancel')}" (clicked)="onCerrar()" />
        <app-primary-button class="small" [config]="{texto: t()('tracker.modal.save'), type: 'submit'}" />
      </div>
    </form>

  </div>
</div>
