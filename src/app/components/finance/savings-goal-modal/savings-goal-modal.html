<dialog #dialogEl (click)="onBackdropClick($event)">
  <div class="modal-panel">

    <header class="modal-header">
      <h2 class="modal-title">Nueva meta de ahorro</h2>
      <button type="button" class="modal-close" (click)="close()" aria-label="Cerrar">×</button>
    </header>

    <form class="create-form" [formGroup]="form" (ngSubmit)="submit()">

      <div class="field">
        <label for="sg-name">Nombre</label>
        <input id="sg-name" type="text" formControlName="name" placeholder="Ej: Viaje, Coche, Emergencias..." />
      </div>

      <div class="field">
        <label for="sg-target">Objetivo (€)</label>
        <input id="sg-target" type="number" formControlName="target" min="0.01" step="0.01" />
      </div>

      <div class="form-actions">
        <app-secondary-button [config]="{texto: 'Cancelar'}" (clicked)="close()" />
        <app-primary-button [config]="{texto: 'Crear meta', type: 'submit'}" [disabled]="form.invalid" />
      </div>

    </form>
  </div>
</dialog>
